# Claude Code Test Runner Configuration
# This file supports environment-specific configurations

# Default configuration (used as base for all environments)
default:
  # Test file configuration
  tests:
    path: ./tests
    patterns:
      - "**/*.json"
    exclude:
      - "**/node_modules/**"

  # Execution configuration
  execution:
    resultsPath: ./results
    verbose: false
    screenshots: false
    maxTurns: 30
    timeout: 300000

  # Claude AI configuration
  claude:
    model: claude-sonnet-4-6

# Environment-specific configurations
# These override the default configuration
environments:
  # Development environment - verbose output, more debugging
  development:
    execution:
      verbose: true
      screenshots: true
      maxTurns: 50

  # Testing environment - balanced performance
  testing:
    execution:
      resultsPath: ./test-results
      screenshots: true
    claude:
      model: claude-haiku-4-5-20251001

  # Production environment - optimized for speed
  production:
    execution:
      maxTurns: 20
      timeout: 180000
    tests:
      exclude:
        - "**/experimental/**"

  # Staging environment - minimal output
  staging:
    execution:
      verbose: false
      screenshots: false
      maxTurns: 25
