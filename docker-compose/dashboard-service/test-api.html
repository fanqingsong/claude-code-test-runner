<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-button {
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .result {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <h1>Test API Call</h1>

    <div>
        <button class="test-button" onclick="testDirectAPI()">Test Direct API Call</button>
        <button class="test-button" onclick="testWithDifferentData()">Test with Different Data</button>
        <button class="test-button" onclick="testFromDashboard()">Test from Dashboard Origin</button>
    </div>

    <div id="result" class="result">Click a button to test...</div>

    <script>
        function log(message, isError = false) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = isError ? 'result error' : 'result success';
        }

        async function testDirectAPI() {
            try {
                log('Sending request to http://localhost:8012/api/v1/jobs/ ...');

                const response = await fetch('http://localhost:8012/api/v1/jobs/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ test_definition_ids: [1] })
                });

                const text = await response.text();

                log(`Status: ${response.status} ${response.statusText}\nResponse: ${text}`, !response.ok);
            } catch (error) {
                log(`Error: ${error.message}`, true);
            }
        }

        async function testWithDifferentData() {
            try {
                log('Testing with different data format...');

                const response = await fetch('http://localhost:8012/api/v1/jobs/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        test_definition_ids: [1],
                        environment: {},
                        priority: 5,
                        scheduled: false
                    })
                });

                const text = await response.text();

                log(`Status: ${response.status} ${response.statusText}\nResponse: ${text}`, !response.ok);
            } catch (error) {
                log(`Error: ${error.message}`, true);
            }
        }

        async function testFromDashboard() {
            try {
                log('Testing from dashboard origin (simulating)...');

                const response = await fetch('http://localhost:8012/api/v1/jobs/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'Origin': 'http://localhost:8013'
                    },
                    mode: 'cors',
                    body: JSON.stringify({ test_definition_ids: [1] })
                });

                const text = await response.text();

                log(`Status: ${response.status} ${response.statusText}\nResponse: ${text}`, !response.ok);
            } catch (error) {
                log(`Error: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
