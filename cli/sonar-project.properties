# SonarQube configuration for TypeScript CLI
sonar.projectKey=claude-code-test-runner:cli
sonar.projectName=Claude Code Test Runner - CLI
sonar.projectVersion=1.0

# Source code location
sonar.sources=src
sonar.tests=tests

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.config.ts,**/coverage/**
sonar.test.exclusions=**/node_modules/**,**/dist/**

# Language settings
sonar.typescript.tsconfigPath=tsconfig.json
sonar.sourceEncoding=UTF-8

# LCOV format coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
