# SonarQube configuration for Python backend
sonar.projectKey=backend
sonar.projectName=Backend
sonar.projectVersion=1.0

# Source code location
sonar.sources=app
sonar.tests=app/tests

# Exclusions
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/node_modules/**,**/tests/**
sonar.test.exclusions=**/migrations/**,**/__pycache__/**

# Language settings
sonar.python.version=3.11
sonar.sourceEncoding=UTF-8

# Coverage configuration (if using pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=pytest-report.xml

# Quality gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
